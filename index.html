<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fenster-Konfigurator" />
    <title>Fenster-Konfigurator</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="images/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="app">
        <header class="app__header">
            <div>
                <h1>Fenster-Konfigurator</h1>
                <p class="subtitle">Fenster & Türen – Material-Übersicht</p>
            </div>
            <img src="images/LOGO_HR.png" alt="Logo" class="header__logo" />
            <div class="header__right">
                <p id="offlineState" class="status-inline">Online</p>
                <button id="installBtn" class="btn btn--primary" hidden>Installieren</button>
            </div>
        </header>

        <section class="card">
            <h4>Fenstertyp wählen</h4>
            <div class="selector">
                <label class="selector__option">
                    <input type="radio" name="windowType" value="dreh" checked />
                    <span>Dreh</span>
                </label>
                <label class="selector__option">
                    <input type="radio" name="windowType" value="kipp" />
                    <span>Kipp</span>
                </label>
                <label class="selector__option">
                    <input type="radio" name="windowType" value="drehkipp" />
                    <span>Drehkipp</span>
                </label>
                <label class="selector__option">
                    <input type="radio" name="windowType" value="stulp" />
                    <span>Stulp</span>
                </label>
            </div>
        </section>

        <section class="card">
            <h4>Maße eingeben</h4>
            <div class="form">
                <div class="dimension-inputs">
                    <label class="field">
                        <span>Flügelbreite (in mm)</span>
                        <input id="widthInput" type="number" placeholder="z. B. 1200" required />
                    </label>
                    <label class="field">
                        <span>Flügelhöhe (in mm)</span>
                        <input id="heightInput" type="number" placeholder="z. B. 1500" required />
                    </label>
                </div>
            </div>
        </section>

        <section class="card">
            <div class="window-display">
                <div class="material material--top" id="materialTop">—</div>
                <div class="window-row">
                    <div class="material material--left" id="materialLeft">—</div>
                    <div class="window-image" id="windowImage">
                        <img src="" alt="Fenster" id="windowImg" />
                    </div>
                    <div class="material material--right" id="materialRight">—</div>
                </div>
                <div class="material material--bottom" id="materialBottom">—</div>
            </div>
        </section>

        
    </main>

    <script src="app.js" defer></script>
</body>
</html>
